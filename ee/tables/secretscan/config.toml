# This config extends the default gitleaks config with some additional settings
# to avoid false positives.
title = "Kolide secretscan config"

[extend]
useDefault = true

[[rules]]
id = "generic-api-key"
[[rules.allowlists]]
description = "Ignore K8s Sealed Secrets (https://github.com/gitleaks/gitleaks/issues/1728)"
condition = "AND"
regexes = ['''Ag[a-zA-Z0-9+/]{500,}={0,2}''']
paths = ['''(?i).*\.ya?ml$''']
[[rules.allowlists]]
description = "Ignore all-caps variable names with empty values (https://github.com/gitleaks/gitleaks/issues/1828)"
condition = "AND"
# We limit length to 35 as a proxy for not allowlisting high-entropy values here.
# Variable names are probably usually under that length. We restrict to all-caps
# for the same reason.
regexes = ['''^\s*[A-Z\d][A-Z\d_-]{0,35}=$''']
paths = ['''.*\.env(\..+)?$''']
[[rules.allowlists]]
description = "Ignore all-lowercase variable names with empty values (https://github.com/gitleaks/gitleaks/issues/1828)"
condition = "AND"
# We limit length to 35 as a proxy for not allowlisting high-entropy values here.
# Variable names are probably usually under that length. We restrict to all-lowercase
# for the same reason.
regexes = ['''^\s*[a-z\d][a-z\d_-]{0,35}=$''']
paths = ['''.*\.env(\..+)?$''']
[[rules.allowlists]]
description = "Ignore key algorithms supported by AWS Certificate Manager (https://github.com/gitleaks/gitleaks/issues/1053)"
condition = "AND"
# Values retrieved from https://docs.aws.amazon.com/acm/latest/APIReference/API_CertificateDetail.html
stopwords = ["RSA_1024", "RSA_2048", "RSA_3072", "RSA_4096", "EC_prime256v1", "EC_secp384r1", "EC_secp521r1"]
[[rules.allowlists]]
description = "Ignore base64-encoded SHA256 hashes of APK signing certificates"
condition = "AND"
regexTarget = "line"
regexes = ['''android:apk-key-hash:''']

[[rules]]
id = "private-key"
[[rules.allowlists]]
description = "Ignore Cosign encrypted private keys (https://github.com/gitleaks/gitleaks/issues/1034)"
condition = "AND"
stopwords = ["BEGIN ENCRYPTED COSIGN PRIVATE KEY", "BEGIN ENCRYPTED SIGSTORE PRIVATE KEY"]

# Custom Kolide detection rules (these add new rules not present in the default
# gitleaks config, as opposed to the allowlists above which tune existing rules).

[[rules]]
id = "1password-recovery-key"
description = "Uncovered a possible 1Password recovery key, potentially compromising account recovery and access to secrets in vaults."
# Recovery keys are the literal prefix "1PRK" followed by 13 hyphen-separated
# groups of 4 uppercase-alphanumeric characters, e.g.
# 1PRK-25QX-VSEX-BGMD-7CEN-6YJN-JAVA-DRQ3-DH2B-OIC4-ST4F-CLUA-BUFS-VRNA
regex = '''\b1PRK-(?:[A-Z0-9]{4}-){12}[A-Z0-9]{4}\b'''
# Genuine keys carry ~4.5 bits/char of entropy; this floor drops doc placeholders
# such as 1PRK-XXXX-XXXX-... while leaving wide margin for real keys.
entropy = 3.5
keywords = ["1prk"]
