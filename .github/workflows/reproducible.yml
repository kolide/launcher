name: reproducible

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    tags: "*"
  pull_request:
    branches: "**"
  merge_group:
    types: [checks_requested]

jobs:
  first_build:
    name: build-1
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-26
          - windows-2025
    steps:
      - name: Check out code
        id: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need a full checkout for `git describe`

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "./go.mod"
          check-latest: true
          cache: false
        id: go

      - id: go-cache-paths
        shell: bash
        run: |
          echo "go-build=$(go env GOCACHE)" >> "$GITHUB_OUTPUT"
          echo "go-mod=$(go env GOMODCACHE)" >> "$GITHUB_OUTPUT"

      - name: Go Build Cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.go-cache-paths.outputs.go-build }}
          key: ${{ runner.os }}-go-build-${{ hashFiles('**/go.sum') }}

      - name: Go Mod Cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.go-cache-paths.outputs.go-mod }}
          key: ${{ runner.os }}-go-mod-${{ hashFiles('**/go.sum') }}

      - name: Get dependencies
        run: make deps

      - name: Set up zig
        if: ${{ contains(matrix.os, 'ubuntu') }}
        uses: mlugg/setup-zig@v2

      - name: Build 1
        run: |
          make -j2 github-build
          mv build build1
          ./build1/launcher --version

      - name: Cache build output
        uses: actions/cache@v5
        with:
          path: ./build1
          key: ${{ github.run_id }}-${{ runner.os }}-reproducible-1
          enableCrossOsArchive: true

  second_build:
    name: build-2
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - macos-15
          - windows-2022
    steps:
      - name: Check out code
        id: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need a full checkout for `git describe`

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "./go.mod"
          check-latest: true
          cache: false
        id: go

      - id: go-cache-paths
        shell: bash
        run: |
          echo "go-build=$(go env GOCACHE)" >> "$GITHUB_OUTPUT"
          echo "go-mod=$(go env GOMODCACHE)" >> "$GITHUB_OUTPUT"

      - name: Go Build Cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.go-cache-paths.outputs.go-build }}
          key: ${{ runner.os }}-go-build-${{ hashFiles('**/go.sum') }}

      - name: Go Mod Cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.go-cache-paths.outputs.go-mod }}
          key: ${{ runner.os }}-go-mod-${{ hashFiles('**/go.sum') }}

      - name: Get dependencies
        run: make deps

      - name: Set up zig
        if: ${{ contains(matrix.os, 'ubuntu') }}
        uses: mlugg/setup-zig@v2
      
      - name: Build 2
        run: |
          make -j2 github-build
          mv build build2
          ./build2/launcher --version

      - name: Cache build output
        uses: actions/cache@v5
        with:
          path: ./build2
          key: ${{ github.run_id }}-${{ runner.os }}-reproducible-2
          enableCrossOsArchive: true

  verify:
    needs: [first_build, second_build]
    name: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        runneros:
          - Linux
          - macOS
          - Windows
    steps:
      - name: cache restore build 1 output
        uses: actions/cache/restore@v5
        with:
          path: ./build1
          key: ${{ github.run_id }}-${{ matrix.runneros }}-reproducible-1
          fail-on-cache-miss: true
          enableCrossOsArchive: true

      - name: cache restore build 2 output
        uses: actions/cache/restore@v5
        with:
          path: ./build2
          key: ${{ github.run_id }}-${{ matrix.runneros }}-reproducible-2
          fail-on-cache-miss: true
          enableCrossOsArchive: true

      - name: Verify (Posix)
        if: matrix.runneros == 'Linux' || matrix.runneros == 'macOS'
        run: |
          HASH1=$(sha256sum build1/launcher | awk '{ print $1 }')
          HASH2=$(sha256sum build2/launcher | awk '{ print $1 }')
          if [ "$HASH1" = "$HASH2" ]; then
            echo "Builds match"
          else
            echo "Builds differ: build 1: ${HASH1}: build 2: ${HASH2}"
          fi

      - name: Verify (Windows)
        if: matrix.runneros == 'Windows'
        run: |
          HASH1=$(sha256sum build1/launcher.exe | awk '{ print $1 }')
          HASH2=$(sha256sum build2/launcher.exe | awk '{ print $1 }')
          if [ "$HASH1" = "$HASH2" ]; then
            echo "Builds match"
          else
            echo "Builds differ: build 1: ${HASH1}: build 2: ${HASH2}"
          fi
