name: Update TUF root.json

on:
  schedule:
    # Once a quarter at 10 am UTC
    - cron: '0 10 1 */3 *'
  workflow_dispatch:  # Allow manual triggering

jobs:
  check-for-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      pr_exists: ${{ steps.check-for-pr.outputs.pr_exists }}
    steps:
      - name: Check if PR already exists
        id: check-for-pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MONTH=$(date +%B)
          YEAR=$(date +%Y)
          EXISTING_PR=$(gh pr list --repo kolide/launcher --state all --search "[Automated] $MONTH $YEAR - Update TUF root.json" --json number,state -q 'map(select(.state == "OPEN" or .state == "MERGED")) | .[0].number // empty' || echo "")

          if [ -n "$EXISTING_PR" ] && [ "$EXISTING_PR" != "null" ]; then
            echo "PR already exists for month $MONTH and year $YEAR (PR #$EXISTING_PR)"
            echo "pr_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "pr_exists=false" >> "$GITHUB_OUTPUT"
          fi

  update-tuf-root-json:
    needs: check-for-pr
    if: needs.check-for-pr.outputs.pr_exists != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          path: launcher

      - name: Update root.json
        working-directory: launcher
        run: make deps

      - name: Configure git
        working-directory: launcher
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create pull request
        working-directory: launcher
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MONTH=$(date +%B)
          YEAR=$(date +%Y)
          TIMESTAMP=$(date +%s)
          BRANCH_NAME="update-tuf-root-json-${TIMESTAMP}"
          BASE_TREE=$(git rev-parse HEAD)
          ROOT_JSON_SHA=$(git hash-object pkg/packaging/assets/tuf/root.json)
          COMMIT_MESSAGE="[Automated] $MONTH $YEAR - Update TUF root.json"

          # For the github-actions bot's commits to be signed, we need to use the GH API
          # to create a tree, a commit, and a reference.
          # See: https://github.com/orgs/community/discussions/50055

          # Create tree
          CREATE_TREE_RESP=$(jq -n \
            --arg base_tree "$BASE_TREE" \
            --arg sha "$ROOT_JSON_SHA" \
            '{base_tree: $base_tree, tree: [{path: "pkg/packaging/assets/tuf/root.json", mode: "100644", type: "blob", sha: $sha}]}' | \
            gh api --method POST -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2026-03-10" \
            /repos/kolide/launcher/git/trees --input -)
          TREE_SHA=$(echo "$CREATE_TREE_RESP" | jq -r '.sha')

          # Create commit
          CREATE_COMMIT_RESP=$(jq -n \
            --arg message "$COMMIT_MESSAGE" \
            --arg parent "$BASE_TREE" \
            --arg tree "$TREE_SHA" \
            '{message: $message, parents: [$parent], tree: $tree}' | \
            gh api --method POST -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2026-03-10" \
            /repos/kolide/launcher/git/commits --input -)
          COMMIT_SHA=$(echo "$CREATE_COMMIT_RESP" | jq -r '.sha')

          # Create reference
          jq -n --arg sha "$COMMIT_SHA" --arg branch "refs/heads/$BRANCH_NAME" '{sha: $sha, ref: $branch}' | \
            gh api --method POST -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2026-03-10" \
            /repos/kolide/launcher/git/refs --input -

          gh pr create \
            --repo kolide/launcher \
            --title "[Automated] $MONTH $YEAR - Update TUF root.json" \
            --body "Automated update of launcher's root.json to the latest version for $MONTH $YEAR." \
            --head "$BRANCH_NAME" \
            --base main
